[package]
name = "obsidian-notion-sync"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ons"
path = "src/main.rs"

[dependencies]
serde = { version = "=1.0.197", features = ["derive"] }
serde_json = "=1.0.115"
clap = { version = "=4.5.2", default-features = false, features = ["std", "help", "usage", "error-context", "suggestions", "color", "derive"] }
anyhow = "1"
walkdir = "=2.5.0"
